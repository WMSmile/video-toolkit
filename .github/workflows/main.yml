name: Build and Release Wails3 App

on:
  push:
    tags:
      - 'v*' # 当你推送 v1.0.0 等标签时触发
  workflow_dispatch: # 允许手动触发测试

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: ubuntu-latest
            platform: linux
            arch: amd64

    runs-on: ${{ matrix.os }}
    # 关键：添加以下权限配置
    permissions:
      contents: write  # 允许创建 Release 并上传文件

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装系统依赖 (Linux 必须)
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config build-essential

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 2. 安装 Task 和 Wails3 CLI
      - name: Install Tools
        run: |
          # 安装 Task
          go install github.com/go-task/task/v3/cmd/task@latest
          # 安装 Wails3
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.75
          # 确保它们都在 PATH 中
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      # 3. 针对 Windows 准备 CGO 编译器 (仅在 Windows 节点执行)
      - name: Install MinGW (Windows only)
        if: matrix.os == 'windows-latest'
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      # 4. 构建步骤
      - name: Build with Task
        run: |
          if [ "${{ matrix.platform }}" = "darwin" ]; then
            task package ARCH=${{ matrix.arch }}
          else
            task build ARCH=${{ matrix.arch }}
          fi
        shell: bash
        env:
          # 关键点：动态设置 CGO
          # Windows 必须开启 CGO 来编译 sherpa-onnx
          # macOS 默认开启 (CGO_ENABLED: 1 在你的 Taskfile.yml 里已经写了)
          CGO_ENABLED: 1
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
          # 只有 Windows 需要明确指定 CC 为 gcc，Linux 默认就有
          CC: ${{ matrix.os == 'windows-latest' && 'gcc' || '' }}

      # 5. 准备发布产物 (由于 .app 是文件夹，Release 无法直接上传，必须先压缩)
      - name: Prepare Artifacts for Release
        run: |
          cd bin
          if [ "${{ matrix.platform }}" = "darwin" ]; then
            # 将 .app 文件夹打包成 zip
            zip -r "../video-toolkit-mac-${{ matrix.arch }}.zip" "video-toolkit.app"
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            # Windows 的二进制通常叫 video-toolkit.exe
            mv video-toolkit.exe "video-toolkit-windows-${{ matrix.arch }}.exe"
          else
            # Linux 等
            mv video-toolkit "video-toolkit-linux-${{ matrix.arch }}"
          fi
        shell: bash

      # 5. 发布产物
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # 只上传根目录下我们刚刚重命名/压缩好的文件
          files: |
            *.zip
            video-toolkit-windows-*
            video-toolkit-linux-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
