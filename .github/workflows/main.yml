name: Build and Release Wails3 App

on:
  push:
    tags:
      - 'v*' # 当你推送 v1.0.0 等标签时触发
  workflow_dispatch: # 允许手动触发测试

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: ubuntu-latest
            platform: linux
            arch: amd64

    runs-on: ${{ matrix.os }}
    # 关键：添加以下权限配置
    permissions:
      contents: write  # 允许创建 Release 并上传文件

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装系统依赖 (Linux 必须)
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config build-essential

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 2. 安装 Task 和 Wails3 CLI
      - name: Install Tools
        run: |
          # 安装 Task
          go install github.com/go-task/task/v3/cmd/task@latest
          # 安装 Wails3
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.75
          # 确保它们都在 PATH 中
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      # 3. 调用 Task 进行编译
      - name: Build with Task
        run: |
          # 假设你的 Taskfile 里定义了类似 build-windows, build-mac 等任务
          # 或者你有一个通用的 build 任务，可以通过环境变量传参
          task build
        env:
          # 如果你的 Taskfile 依赖这些环境变量来区分平台，请传递进去
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}

     # 4. 标准化产物路径 (基于你说的 bin/ 目录)
      - name: Prepare Release Artifacts
        shell: bash
        run: |
          mkdir -p release-dist
          # 打印一下 bin 目录内容，方便在 Actions 日志里排查
          echo "Checking bin directory content:"
          ls -R bin/

          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # macOS: 压缩 bin 目录下的 .app 文件夹
            # 假设生成的 app 叫 video-toolkit.app
            cd bin && zip -r ../release-dist/video-toolkit-mac-universal.zip *.app && cd ..
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows: 拷贝 bin 目录下的 .exe
            cp bin/*.exe release-dist/ 2>/dev/null || true
          else
            # Linux: 拷贝 bin 目录下的二进制文件
            # 如果文件名不固定，可以用 cp bin/* release-dist/
            cp bin/video-toolkit release-dist/video-toolkit-linux 2>/dev/null || cp bin/* release-dist/ || true
          fi

      # 5. 上传到 Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # 关键：现在指向整理好的 release-dist 文件夹
          files: release-dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
